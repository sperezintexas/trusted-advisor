server:
  port: 8080
  forward-headers-strategy: framework

spring:
  application:
    name: trusted-advisor
  servlet:
    multipart:
      max-file-size: 75MB
      max-request-size: 75MB
  data:
    mongodb:
      # URI from .env: MONGODB_URI or MONGODB_URI_B64 (decoded in App.kt). Database from MONGODB_DATABASE only.
      uri: ${MONGODB_URI:mongodb://localhost:27017/trusted-advisor}
      database: ${MONGODB_DATABASE:trusted-advisor}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - email
              - profile
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope:
              - read:user
              - user:email

management:
  endpoints:
    web:
      exposure:
        include: "*"

# Environment: loaded from repo-root .env when running (e.g. ./gradlew bootRun uses workingDir=root).
# Set MONGODB_URI (or MONGODB_URI_B64), XAI_API_KEY, AUTH_SECRET in .env.
xai:
  api:
    key: ${XAI_API_KEY:}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  products:
    basic: ${STRIPE_PRODUCT_ID_BASIC:}
    premium: ${STRIPE_PRODUCT_ID_PREMIUM:}
  prices:
    basic: ${STRIPE_PRICE_ID_BASIC:}
    premium: ${STRIPE_PRICE_ID_PREMIUM:}

# API key auth: frontend sends X-API-Key or Authorization: Bearer <key>; must match AUTH_SECRET.
# OAuth2 success redirect and cookie: set FRONTEND_URL when frontend is on another origin.
# Admin emails: comma-separated list of emails with admin privileges (can approve/reject access requests).
# Slack: webhook URL for admin notifications (access requests, approvals, etc.)
app:
  auth-secret: ${AUTH_SECRET:}
  auth-debug: ${AUTH_DEBUG:false}
  skip-auth: ${APP_SKIP_AUTH:false}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  admin-emails: ${ADMIN_EMAILS:}
  slack:
    enabled: ${SLACK_ENABLED:false}
    webhook-url: ${SLACK_WEBHOOK_URL:}
    reminder-enabled: ${SLACK_REMINDER_ENABLED:false}
    reminder-interval-ms: ${SLACK_REMINDER_INTERVAL_MS:14400000}
    reminder-initial-delay-ms: ${SLACK_REMINDER_INITIAL_DELAY_MS:60000}

logging:
  level:
    com.atxbogart: DEBUG
    root: INFO